services:
  - name: repo-agent-linear-bot
    runtime: python
    plan: free
    dockerfilePath: Dockerfile
    envVars:
      - key: LINEAR_CLIENT_ID
        sync: false
      - key: LINEAR_CLIENT_SECRET
        sync: false
      - key: LINEAR_WEBHOOK_SECRET
        sync: false
      - key: LINEAR_APP_ACCESS_TOKEN
        sync: false
      - key: LINEAR_REFRESH_TOKEN
        sync: false
      - key: RAG_BACKEND_URL
        sync: false
      - key: REPOS_JSON
        sync: false
